<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Connexion — Formation Étude de marché</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f7f1e8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2933;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #0f5748;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    p {
      margin: 0 0 24px;
      color: #667085;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid #d0d5dd;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #0f5748;
      box-shadow: 0 0 0 3px rgba(15, 87, 72, 0.12);
    }

    button {
      width: 100%;
      padding: 15px;
      border: 0;
      border-radius: 999px;
      background: #0f5748;
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.92;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message-error {
      color: #b42318;
    }

    .message-success {
      color: #0f5748;
    }

    .message-info {
      color: #667085;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="logo">EM</div>

    <h1>Connexion</h1>
    <p>Accède à ta formation en ligne.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        placeholder="exemple@email.com"
        autocomplete="email"
      />

      <label for="password">Mot de passe</label>
      <input
        id="password"
        type="password"
        placeholder="Mot de passe"
        autocomplete="current-password"
      />

      <button id="loginButton" type="submit">
        Se connecter
      </button>

      <div id="message"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://xlyhujiebervldzoxouk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_IqLPvaAeDZoDlYKE-m_Fxw_29Zbnhh_";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const loginForm = document.getElementById("loginForm");
    const loginButton = document.getElementById("loginButton");
    const message = document.getElementById("message");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "";

      if (type === "error") {
        message.classList.add("message-error");
      }

      if (type === "success") {
        message.classList.add("message-success");
      }

      if (type === "info") {
        message.classList.add("message-info");
      }
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      showMessage("", "info");

      if (!email || !password) {
        showMessage("Entre ton email et ton mot de passe.", "error");
        return;
      }

      if (!isValidEmail(email)) {
        showMessage("Entre une adresse email valide.", "error");
        return;
      }

      loginButton.disabled = true;
      loginButton.textContent = "Connexion...";
      showMessage("Vérification en cours...", "info");

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        loginButton.disabled = false;
        loginButton.textContent = "Se connecter";

        showMessage("Email ou mot de passe incorrect.", "error");
        return;
      }

      if (!data.session) {
        loginButton.disabled = false;
        loginButton.textContent = "Se connecter";

        showMessage("Connexion refusée. Réessaie.", "error");
        return;
      }

      showMessage("Connexion réussie. Redirection...", "success");

      setTimeout(() => {
        window.location.href = "./index.html";
      }, 700);
    }

    loginForm.addEventListener("submit", function(event) {
      event.preventDefault();
      login();
    });

    async function redirectIfAlreadyConnected() {
      const { data } = await supabaseClient.auth.getSession();

      if (data.session) {
        window.location.href = "./index.html";
      }
    }

    redirectIfAlreadyConnected();
  </script>
</body>
</html>
